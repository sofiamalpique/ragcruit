services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragcruit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragcruit"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init/01-enable-pgvector.sql:/docker-entrypoint-initdb.d/01-enable-pgvector.sql:ro
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync python -c \"from app.db.init_db import create_db_tables; create_db_tables()\" && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ragcruit
    ports:
      - "8000:8000"

volumes:
  postgres_data:
